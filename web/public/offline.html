<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 — 모먼트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      min-height: 100dvh;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #333;
      padding: 1rem;
    }
    .container { text-align: center; max-width: 360px; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #666; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #111; color: #fff; border: none; border-radius: 0.75rem;
      padding: 0.75rem 1.5rem; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; min-height: 44px; min-width: 44px;
    }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>인터넷 연결 없음</h1>
    <p>네트워크에 연결되어 있지 않습니다. 연결 후 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
