name: MemoryMap
options:
  bundleIdPrefix: com.jeonsihyeon
  postGenCommand: ./scripts/apply_storekit_scheme.sh
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.jeonsihyeon.memorymap
    DEVELOPMENT_TEAM: ""
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.30.0"
targets:
  MemoryMap:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - Fonts
      - Features
      - Shared
      - path: App/Fonts
        type: folder
        buildPhase: resources
    resources:
      - App/Assets.xcassets
      - App/PrivacyInfo.xcprivacy
      - App/Resources/Localizable.xcstrings
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.jeonsihyeon.memorymap.refresh
          - com.jeonsihyeon.memorymap.rewind
        UIBackgroundModes:
          - fetch
          - processing
        NSLocationWhenInUseUsageDescription: "Show nearby memory pins and place-based rewind moments."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Deliver rewind moments when you return to meaningful places."
        NSPhotoLibraryAddUsageDescription: "Save shared memory photos to your library."
        NSPhotoLibraryUsageDescription: "Attach photos to group memories."
        UNUserNotificationCenterUsageDescription: "Send rewind reminders and group updates."
        SupabaseURL: "https://umkbjxycdgfhgwcnfbmo.supabase.co"
        SupabasePublishableKey: "sb_publishable_eA_S-ojxFJwFV53VN6k4Nw_KfcGTZm3"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.jeonsihyeon.memorymap.deeplink
            CFBundleURLSchemes:
              - unfading
        CFBundleLocalizations:
          - ko
          - en
        NSUserActivityTypes:
          - com.jeonsihyeon.memorymap.shortcuts.showTodayMemories
          - com.jeonsihyeon.memorymap.shortcuts.newMemory
          - com.jeonsihyeon.memorymap.shortcuts.showCalendar
        UIAppFonts:
          - Fonts/GowunDodum-Regular.ttf
          - Fonts/Nunito-Regular.ttf
          - Fonts/Nunito-SemiBold.ttf
          - Fonts/Nunito-Bold.ttf
          - Fonts/Nunito-Black.ttf
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: MemoryMap
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/MemoryMap.entitlements
    dependencies:
      - sdk: AppIntents.framework
      - sdk: MapKit.framework
      - sdk: AuthenticationServices.framework
      - package: Supabase
        product: Supabase
  UnfadingWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Widget
      - Shared/UnfadingTheme.swift
      - Shared/UnfadingLocalized.swift
      - Shared/SampleModels.swift
      - path: App/Fonts
        type: folder
        buildPhase: resources
    resources:
      - App/Assets.xcassets
      - App/Resources/Localizable.xcstrings
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: 오늘의 추억
        CFBundleLocalizations:
          - ko
          - en
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - Fonts/GowunDodum-Regular.ttf
          - Fonts/Nunito-Regular.ttf
          - Fonts/Nunito-SemiBold.ttf
          - Fonts/Nunito-Bold.ttf
          - Fonts/Nunito-Black.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeonsihyeon.memorymap.widget
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
  UnfadingShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Unfading Share
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 12
            PHSupportedMediaTypes:
              - Image
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeonsihyeon.memorymap.share
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
    dependencies:
      - sdk: UIKit.framework
      - sdk: Photos.framework
      - sdk: UniformTypeIdentifiers.framework
  MemoryMapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    resources:
      - App/Resources/Localizable.xcstrings
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_SupabaseURL: "https://umkbjxycdgfhgwcnfbmo.supabase.co"
        INFOPLIST_KEY_SupabasePublishableKey: "sb_publishable_eA_S-ojxFJwFV53VN6k4Nw_KfcGTZm3"
    dependencies:
      - target: MemoryMap
      - target: UnfadingWidget
  UnfadingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MemoryMap
schemes:
  MemoryMap:
    build:
      targets:
        MemoryMap: all
        UnfadingWidget: all
        UnfadingShareExtension: all
        MemoryMapTests: [test]
        UnfadingUITests: [test]
    run:
      storeKitConfiguration: StoreKitConfiguration.storekit
    test:
      storeKitConfiguration: StoreKitConfiguration.storekit
      targets:
        - MemoryMapTests
        - UnfadingUITests
