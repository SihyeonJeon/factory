# Operator-doc lint config — Harness v5.0
# Scope: operator/**/*.md, AGENTS.md, .claude/CLAUDE.md (round-0 scope per Codex R3).
# Swift/Python linting intentionally out of scope for round 0.
# Runner: harness/check_operator_round.py

schema_version = 1

# Line count caps. Exceeding = Gate 5 blocker.
[line_caps]
"AGENTS.md" = 80
".claude/CLAUDE.md" = 80
"context_harness/operator/OPERATOR.md" = 120
"context_harness/operator/FILE_INDEX.md" = 250

# Line count warnings (advisory, not blocker). Warn threshold < cap gives an advisory window.
[line_warnings]
"context_harness/operator/FILE_INDEX.md" = 225

# Required frontmatter keys on meeting files.
meeting_required_frontmatter = [
  "round",
  "stage",
  "status",
  "participants",
  "decision_id",
  "contract_hash",
  "created_at",
]

# Allowed values for meeting frontmatter fields.
[meeting_frontmatter_allowed]
status = ["draft", "in_review", "decided", "escalated", "abandoned"]
stage = [
  "overall_planning",
  "detailed_design",
  "convention_lock",
  "eval_protocol",
  "acceptance",
  "round_lock",
  "coding_1st",
  "runtime_capture",
  "evaluation_verdict",
  "gate2",
  "coding_2nd",
  "retro",
  "regulation_update",
  "operator_amendment",
  "factual_verification",
]

[meeting_required_sections]
any = ["## Context"]
decided = ["## Decision", "## Challenge Section"]

# Challenge Section content rule.
[challenge_section]
factual_stages = ["factual_verification"]
factual_required_phrase = "No normative decision; verified facts only"
decision_required_keywords = [
  "Objection",
  "Risk",
  "Rejected alternative",
  "Uncertainty",
  "rejected",
  "dissent",
]

# FILE_INDEX coverage.
# Scan all top-level operator/* files (including non-MD governance files like lint_config.toml),
# exempt meeting/proposal/retro/contract/lock/index subdirs, CHANGELOG, and FILE_INDEX itself.
[file_index_coverage]
target = "context_harness/operator/FILE_INDEX.md"
required_scan_globs = [
  "context_harness/operator/*.md",
  "context_harness/operator/*.toml",
  "context_harness/operator/*.yaml",
  "context_harness/operator/*.yml",
]
exempt = [
  "context_harness/operator/CHANGELOG.md",
  "context_harness/operator/FILE_INDEX.md",
  "context_harness/operator/meetings/**",
  "context_harness/operator/proposals/**",
  "context_harness/operator/round_retro/**",
  "context_harness/operator/contracts/**",
  "context_harness/operator/locks/**",
  "context_harness/operator/indexes/**",
]

# Loader pointer rule.
[[loader_pointers]]
file = ".claude/CLAUDE.md"
must_reference = "context_harness/operator/OPERATOR.md"

[[loader_pointers]]
file = "AGENTS.md"
must_reference = "context_harness/operator/OPERATOR.md"

# Legacy docs marked SUPERSEDED.
superseded_docs = ["docs/design-docs/multi-agent-architecture.md"]

# Path existence allowlist — references that legitimately point at future/shorthand/grep-hint paths.
# Missing paths NOT in this allowlist trigger Gate 5 blocker (not advisory).
[path_existence]
allowlist_placeholders = [
  # Future-structure references
  "context_harness/operator/indexes/",
  "context_harness/operator/indexes",
  # Grep hints (paths shown with shorthand to indicate "find via grep within round")
  "workspace/ios/.../UnfadingTheme.swift",
  # Placeholder artifacts that may be empty until first real round
  "docs/exec-plans/metrics.jsonl",
]

# Forbidden language in Claude Code's evidence capture reports.
evidence_forbidden_language = [
  "PASS",
  "BLOCKER",
  "ADVISORY",
  "verdict",
  "regression",
  "acceptable",
]

# Precedence order (1 = highest).
precedence = [
  "active_round_contract_lock",
  "context_harness/operator/REGULATION.md",
  "context_harness/operator/STAGE_CONTRACT.md",
  "context_harness/operator/OPERATOR.md",
  "docs/design-docs/design-revision-workflow.md",
  "docs/design-docs/multi-agent-architecture.md",
  "context_harness/00_system_rules.md",
]
