// ===== ios-frame.jsx =====

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// ───────────────────────────────────────────────────────────
// Bottom sheet — manages snap points + content
// ───────────────────────────────────────────────────────────
function BottomSheet({ snap, onSnap, children, frameHeight, expandedHeader, collapsedSummary }) {
  const height = Math.round(frameHeight * SHEET_STATES[snap]);
  const cycle = () => {
    const next = snap === 'collapsed' ? 'default' : snap === 'default' ? 'expanded' : 'collapsed';
    onSnap(next);
  };
  const isExpanded = snap === 'expanded';
  const isCollapsed = snap === 'collapsed';
  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 40,
      height, background: THEME.sheet,
      borderTopLeftRadius: isExpanded ? 0 : THEME.sheetRadius,
      borderTopRightRadius: isExpanded ? 0 : THEME.sheetRadius,
      boxShadow: isExpanded ? 'none' : '0 -8px 28px rgba(64,56,51,0.08), 0 -1px 0 rgba(64,56,51,0.04)',
      display: 'flex', flexDirection: 'column',
      transition: 'height 340ms cubic-bezier(0.32, 0.72, 0, 1), border-radius 260ms ease',
      overflow: 'hidden',
    }}>
      {/* Handle + (collapsed-only) summary — hidden when expanded */}
      {!isExpanded && (
        <button onClick={cycle} style={{
          padding: isCollapsed ? '8px 16px 6px' : '10px 0 8px',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
          border: 'none', background: 'transparent', cursor: 'pointer',
          width: '100%',
        }}>
          <div style={{
            width: 42, height: 5, borderRadius: 3,
            background: `${THEME.primary}66`,
          }}/>
          {isCollapsed && collapsedSummary}
        </button>
      )}

      {/* Expanded merged header (fades in) */}
      {isExpanded && expandedHeader && (
        <div style={{ animation: 'fadeDown 260ms ease', paddingTop: 54 }}>
          {expandedHeader}
        </div>
      )}

      <div style={{
        flex: 1, overflowY: 'auto', overscrollBehavior: 'contain',
        scrollbarWidth: 'none',
      }}>{children}</div>
    </div>
  );
}

// Archive — 이벤트별로 사진 보관함(갤러리) 스타일
function SheetArchive({ group, onOpenMemory }) {
  // Group memories by event
  const byEvent = Object.values(EVENTS).map(ev => ({
    event: ev,
    mems: MEMORIES.filter(m => m.eventId === ev.id),
  })).filter(g => g.mems.length > 0 || g.event.id === 'e2');
  // Fallback fill: pad events w/o memories with gradient placeholders
  const fillMems = (ev) => {
    const existing = MEMORIES.filter(m => m.eventId === ev.id);
    if (existing.length) return existing;
    const gradients = [
      'linear-gradient(135deg, #F5D9C8, #F5998C)',
      'linear-gradient(135deg, #E3D9F2, #C2B0DE)',
      'linear-gradient(135deg, #CDE2DA, #8FB7A8)',
      'linear-gradient(135deg, #FAE4C8, #E4B978)',
    ];
    return Array.from({ length: 3 }).map((_, i) => ({
      id: `${ev.id}-${i}`, eventId: ev.id, place: ev.place, time: '—',
      cover: gradients[i % gradients.length], posts: 1, likes: 0, note: '', tags: [],
    }));
  };

  const [sort, setSort] = React.useState('recent'); // recent | oldest

  const sortedEvents = [...byEvent].sort((a, b) => {
    return sort === 'recent'
      ? b.event.date.localeCompare(a.event.date)
      : a.event.date.localeCompare(b.event.date);
  });

  return (
    <div style={{ padding: '0 0 80px' }}>
      {/* Header / sort */}
      <div style={{
        padding: '0 20px 10px',
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{
            fontFamily: 'Gowun Dodum, system-ui', fontSize: 20, fontWeight: 700,
            color: THEME.textPrimary, letterSpacing: -0.3,
          }}>모든 추억</div>
          <div style={{
            fontSize: 12, color: THEME.textSecondary,
            fontFamily: 'Nunito, system-ui', marginTop: 2,
          }}>{sortedEvents.length}개 이벤트 · {sortedEvents.reduce((s, g) => s + fillMems(g.event).length, 0)}장</div>
        </div>
        <button onClick={() => setSort(sort === 'recent' ? 'oldest' : 'recent')} style={{
          background: THEME.surface, border: 'none', borderRadius: 14,
          padding: '6px 12px', cursor: 'pointer',
          fontFamily: 'Gowun Dodum, system-ui', fontSize: 12, fontWeight: 700,
          color: THEME.textPrimary,
          display: 'inline-flex', alignItems: 'center', gap: 5,
        }}>
          {sort === 'recent' ? '최신순' : '오래된순'}
          <Icon name="chevronD" size={11} color={THEME.textSecondary} strokeWidth={2.2}/>
        </button>
      </div>

      {/* Events as gallery sections */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18, padding: '0 16px' }}>
        {sortedEvents.map(({ event }) => {
          const mems = fillMems(event);
          return (
            <div key={event.id}>
              {/* Event header */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '0 4px 8px',
              }}>
                <div style={{
                  width: 40, height: 40, borderRadius: 11, background: THEME.accentSoft,
                  display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0,
                }}>
                  <div style={{
                    fontFamily: 'Nunito, system-ui', fontSize: 8.5, fontWeight: 800,
                    color: THEME.primary, textTransform: 'uppercase', letterSpacing: 0.5,
                  }}>{event.date.slice(5, 7) === '01' ? 'JAN'
                      : event.date.slice(5, 7) === '02' ? 'FEB'
                      : event.date.slice(5, 7) === '03' ? 'MAR'
                      : event.date.slice(5, 7) === '04' ? 'APR' : '—'}</div>
                  <div style={{
                    fontFamily: 'Gowun Dodum, system-ui', fontSize: 15, fontWeight: 700,
                    color: THEME.primary, lineHeight: 1, marginTop: 1,
                  }}>{event.date.slice(8, 10).replace('–', '')}</div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontFamily: 'Gowun Dodum, system-ui', fontSize: 14.5, fontWeight: 700,
                    color: THEME.textPrimary, letterSpacing: -0.2,
                    whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                  }}>{event.title}</div>
                  <div style={{
                    fontSize: 11, color: THEME.textSecondary,
                    fontFamily: 'Nunito, system-ui', marginTop: 1,
                  }}>{event.place} · {mems.length}장</div>

                <Icon name="chevronR" size={14} color={THEME.textTertiary} strokeWidth={2}/>
              </div>
              {/* Gallery grid — 사진 보관함 느낌 */}
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 3,
                borderRadius: 14, overflow: 'hidden',
              }}>
                {mems.slice(0, 9).map(m => (
                  <button key={m.id}
                    onClick={() => onOpenMemory(m.id)}
                    style={{
                      background: 'transparent', border: 'none', padding: 0,
                      cursor: 'pointer', aspectRatio: '1/1', position: 'relative',
                    }}>
                    <div style={{
                      position: 'absolute', inset: 0,
                      background: m.cover,
                      borderRadius: 6,
                    }}/>

                      position: 'absolute', inset: 0,

                  <div key={`pad-${i}`}/>

              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  return (
    <div style={{ marginTop: 14 }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        marginBottom: 6,
      }}>
        <div style={{ fontFamily: 'Gowun Dodum, system-ui', fontSize: 12, fontWeight: 700, color: THEME.textSecondary, textTransform: 'uppercase', letterSpacing: 0.6 }}>
          {label}
        </div>
        {status === 'needs-confirm' && (
          <div style={{ fontSize: 10.5, color: THEME.primary, fontWeight: 700, fontFamily: 'Nunito, system-ui' }}>
            확인 필요
          </div>

          <div style={{ fontSize: 10.5, color: THEME.primary, fontWeight: 700, fontFamily: 'Nunito, system-ui' }}>

      <button onClick={onClick} style={{
        width: '100%', background: THEME.card, border: ring, outline: 'none',
        borderRadius: THEME.cardRadius, padding: 14, cursor: 'pointer', textAlign: 'left',
        boxShadow: '0 2px 6px rgba(64,56,51,0.04)',

  );
}

function PickerSheet({ title, onClose, children }) {

function SearchField({ placeholder }) {
  return (
    <div style={{
      background: THEME.surface, borderRadius: 12, padding: '10px 14px',
      display: 'flex', alignItems: 'center', gap: 10,
    }}>
      <Icon name="search" size={16} color={THEME.textSecondary} strokeWidth={2}/>
      <input placeholder={placeholder} style={{
        flex: 1, background: 'transparent', border: 'none', outline: 'none',
        fontFamily: 'Gowun Dodum, system-ui', fontSize: 14, color: THEME.textPrimary,
      }}/>
    </div>
  );
}

function WheelPicker({ values, value, onChange, format }) {
  const idx = values.indexOf(value);
  return (
    <div style={{
      width: 80, height: 160, position: 'relative',
      background: THEME.surface, borderRadius: 14, overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', left: 0, right: 0, top: 60, height: 40,
        background: THEME.accentSoft, borderTop: `0.5px solid ${THEME.primary}33`, borderBottom: `0.5px solid ${THEME.primary}33`,
      }}/>
      <div style={{
        display: 'flex', flexDirection: 'column',
        transform: `translateY(${60 - idx * 40}px)`,
        transition: 'transform 280ms cubic-bezier(0.32, 0.72, 0, 1)',
      }}>
        {values.map(v => (
          <div key={v} onClick={() => onChange(v)} style={{
            height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Gowun Dodum, system-ui', fontSize: 22,
            fontWeight: v === value ? 700 : 400,
            color: v === value ? THEME.primary : THEME.textTertiary,
            cursor: 'pointer',
          }}>{format ? format(v) : v}</div>
        ))}
      </div>
    </div>
  );
}

// ===== app.jsx =====
// Root App — orchestrates the iPhone frame + all screens + a side scene-switcher rail

const { useState, useEffect, useRef } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "mode": "general_group",
  "mapTheme": "vintage",
  "sheetSnap": "default",
  "showTweaks": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [editMode, setEditMode] = useState(false);
  const [scene, setScene] = useState(() => localStorage.getItem('unf.scene') || 'map-default');
  const [markerId, setMarkerId] = useState(null);
  const [memoryId, setMemoryId] = useState('mem1');
  const [filterChip, setFilterChip] = useState('전체');
  const [tab, setTab] = useState('map'); // 지도 / 캘린더 / 설정
  const [activeGroupId, setActiveGroupId] = useState(() => localStorage.getItem('unf.group') || 'g2');
  const [groupPickerOpen, setGroupPickerOpen] = useState(false);
  const [sheetTab, setSheetTab] = useState('curated'); // curated | archive
  const [categories, setCategories] = useState(() => {
    try { return JSON.parse(localStorage.getItem('unf.cats')) || DEFAULT_CATEGORIES; }
    catch { return DEFAULT_CATEGORIES; }
  });
  const [catEditorOpen, setCatEditorOpen] = useState(false);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      const t = e.data?.type;
      if (t === '__activate_edit_mode') setEditMode(true);
      else if (t === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const patch = (p) => {
    const next = { ...tweaks, ...p };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: p }, '*');
  };

  useEffect(() => { localStorage.setItem('unf.scene', scene); }, [scene]);
  useEffect(() => { localStorage.setItem('unf.group', activeGroupId); }, [activeGroupId]);
  useEffect(() => { localStorage.setItem('unf.cats', JSON.stringify(categories)); }, [categories]);

  const group = GROUPS.find(g => g.id === activeGroupId) || GROUPS[0];
  // keep tweaks.mode in sync with active group for existing copy switches
  useEffect(() => {
    if (tweaks.mode !== group.mode) patch({ mode: group.mode });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [group.mode]);

  // Frame sizing
  const FRAME_W = 402, FRAME_H = 874;

  // Scene list
  const scenes = [
    { id: 'map-default', label: '① 메인 지도', kind: 'map' },
    { id: 'map-cluster', label: '② 클러스터 선택', kind: 'map' },
    { id: 'map-marker', label: '③ 핀 선택', kind: 'map' },
    { id: 'detail', label: '④ 추억 상세', kind: 'screen' },
    { id: 'composer', label: '⑤ 추억 만들기', kind: 'screen' },
    { id: 'calendar', label: '⑥ 달력', kind: 'screen' },
    { id: 'rewind', label: '⑦ 리와인드', kind: 'screen' },
    { id: 'group', label: '⑧ 그룹 허브', kind: 'screen' },
  ];

  // Sheet snap mapping by scene
  const snapByScene = {
    'map-default': tweaks.sheetSnap || 'default',
    'map-cluster': 'expanded',
    'map-marker': 'expanded',
  };
  const activeSnap = snapByScene[scene] || 'default';
  const [snap, setSnap] = useState(activeSnap);
  useEffect(() => { setSnap(activeSnap); }, [scene, activeSnap]);

  // Set marker selection per scene
  useEffect(() => {
    if (scene === 'map-cluster') setMarkerId('m2');
    else if (scene === 'map-marker') setMarkerId('m3');
    else if (scene === 'map-default') setMarkerId(null);
  }, [scene]);

  return (
    <div style={{
      minHeight: '100vh', width: '100%', position: 'relative',
      background: '#F4ECE3',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 20, boxSizing: 'border-box',
      fontFamily: 'Gowun Dodum, Nunito, system-ui',
    }}>
      {/* Subtle aesthetic backdrop */}
      <div style={{
        position: 'fixed', inset: 0, pointerEvents: 'none',
        background: `
          radial-gradient(ellipse 600px 400px at 15% 20%, rgba(245,153,140,0.18), transparent 60%),
          radial-gradient(ellipse 500px 350px at 85% 80%, rgba(194,176,222,0.18), transparent 60%),
          radial-gradient(ellipse 800px 500px at 50% 50%, rgba(255,250,245,0.5), transparent 70%)

      }}/>

      <div style={{
        display: 'flex', gap: 28, alignItems: 'center',

      }}>

        <SceneRail scenes={scenes} scene={scene} setScene={setScene}/>

        {/* Phone frame */}

          style={{ '--sheet-height': `${Math.round(FRAME_H * SHEET_STATES[snap])}px`, position: 'relative' }}>
          <IOSDevice width={FRAME_W} height={FRAME_H} dark={tweaks.mapTheme === 'dark'}>
            {/* All scenes share same device; render the right content layer */}

            {/* Map-based scenes */}
            {scene.startsWith('map-') && (

                <MapBackdrop theme={tweaks.mapTheme} pins={MARKERS}
                  selectedMarker={markerId}
                  onSelectMarker={(id) => {
                    const m = MARKERS.find(x => x.id === id);
                    setMarkerId(id);
                    setScene(m.cluster ? 'map-cluster' : 'map-marker');
                  }}
                  mode={tweaks.mode}/>
                {snap !== 'expanded' && (<>

            )}
            {scene === 'group' && (<>
              <GroupHubScreen onBack={() => setScene('map-default')}
                group={group} mode={tweaks.mode}
                onChangeMode={(m) => patch({ mode: m })}
                onSwitchGroup={() => setGroupPickerOpen(true)}/>
              <IOSTabBar active={tab}
                onChange={(t) => { setTab(t); if (t === 'calendar') setScene('calendar'); else if (t === 'settings') setScene('group'); else setScene('map-default'); }}/>
            </>)}
          </IOSDevice>
        </div>

        {/* Info panel (design notes) */}
        <InfoPanel scene={scene} mode={tweaks.mode}/>
      </div>

      {/* Tweaks panel */}
      {editMode && <TweaksPanel tweaks={tweaks} patch={patch}/>}

      {/* Group picker overlay */}
      {groupPickerOpen && (
        <GroupPickerOverlay
          groups={GROUPS}
          activeId={activeGroupId}
          onPick={(id) => { setActiveGroupId(id); setGroupPickerOpen(false); setScene('map-default'); }}
          onClose={() => setGroupPickerOpen(false)}/>
      )}

      {/* Category editor overlay */}
      {catEditorOpen && (
        <CategoryEditorOverlay
          categories={categories}

      )}
    </div>
  );
}

  const [newIcon, setNewIcon] = React.useState('sparkle');

  const addCat = () => {
    const name = newName.trim();
    if (!name || draft.some(c => c.id === name)) return;
    setDraft([...draft, { id: name, icon: newIcon }]);
    setNewName('');
    setNewIcon('sparkle');
  };
  const removeCat = (id) => setDraft(draft.filter(c => c.id !== id));
  const save = () => { onChange(draft); onClose(); };
  const reset = () => setDraft(DEFAULT_CATEGORIES);

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 10000,

              flex: 1, background: THEME.sheet, border: `0.5px solid ${THEME.divider}`,
              borderRadius: 10, padding: '9px 12px', outline: 'none',
              fontFamily: 'Gowun Dodum, system-ui', fontSize: 13.5, color: THEME.textPrimary,
            }}/>
            <button onClick={addCat} style={{
              background: THEME.primary, color: '#fff', border: 'none', borderRadius: 10,
              padding: '9px 14px', fontFamily: 'Gowun Dodum, system-ui',
              fontSize: 13, fontWeight: 700, cursor: 'pointer',
            }}>추가</button>
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 10 }}>
            {CAT_ICON_CHOICES.map(ic => {
              const on = ic === newIcon;
              return (
                <button key={ic} onClick={() => setNewIcon(ic)} style={{
                  width: 34, height: 34, borderRadius: 10, border: 'none',
                  background: on ? THEME.primary : THEME.sheet,
                  cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: on ? '0 2px 6px rgba(245,153,140,0.4)' : 'none',
                }}>
                  <Icon name={ic} size={15} color={on ? '#fff' : THEME.textSecondary} strokeWidth={2}/>
                </button>
              );
            })}
          </div>
        </div>

        {/* Footer */}
        <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
          <button onClick={reset} style={{
            flex: 1, background: THEME.surface, border: 'none',
            borderRadius: 12, padding: 12,
            fontFamily: 'Gowun Dodum, system-ui', fontSize: 13.5, fontWeight: 700,
            color: THEME.textSecondary, cursor: 'pointer',
          }}>기본값</button>
          <button onClick={save} style={{
            flex: 2, background: THEME.primary, color: '#fff', border: 'none',
            borderRadius: 12, padding: 12,
            fontFamily: 'Gowun Dodum, system-ui', fontSize: 14, fontWeight: 700,
            cursor: 'pointer',
            boxShadow: '0 4px 12px rgba(245,153,140,0.4)',
          }}>저장</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
